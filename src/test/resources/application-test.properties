# ================================================================
# Configuración de tests de integración - BD H2 en memoria
# Sobreescribe application.properties para evitar conexión a MySQL
# ================================================================

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never

# JWT Config (mismas claves que producción, sólo para arrancar el contexto)
security.jwt.secret-
security.jwt.access-token.expiration=900000
security.jwt.refresh-token.expiration=604800000

# Cifrado de IDs
security.id.encryption.password=e36d912f7d961d120a24e76f44918cfa054b9fa65d7ea1f177cb55fbaec337ba
security.id.encryption.salt=a594d8816de549f57b60ce8846d38928

# API de facturación (dummy para tests - no se llamará)
api.facturacion.email=test@test.com
api.facturacion.password=test123
api.facturacion.url=http://localhost:9999

# Token externos (dummy)
token.consulta=test-token

# Deshabilitar logs verbosos en tests
logging.level.org.springframework=WARN
logging.level.com.restaurante=WARN
